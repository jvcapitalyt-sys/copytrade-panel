async function go(){
  var err=document.getElementById('err'); err.textContent='';
  var pw=document.getElementById('pw').value;
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2u(IV)},key,b2u(CT));
    var html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){ err.textContent='Contrase\u00f1a incorrecta'; }
}
